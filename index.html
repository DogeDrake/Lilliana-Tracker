<!doctype html>
<html lang="en">


<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/Logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lilliana Tracker</title>
</head>

<script type="text/javascript">
  // Este script comprueba si venimos de una redirección del 404.html
  (function (l) {
    if (l.search[1] === 'p') {
      var decoded = l.search.slice(1).split('&').map(function (s) {
        return s.replace(/~and~/g, '&')
      }).filter(function (s) {
        return s.slice(0, 2) === 'p='
      })[0].slice(2);
      if (decoded !== l.pathname.slice(l.pathname.lastIndexOf('/') + 1)) {
        window.history.replaceState(null, null,
          l.pathname.slice(0, l.pathname.lastIndexOf('/') + 1) + decoded + (l.search.slice(1).split('&').filter(function (s) {
            return s.slice(0, 2) !== 'p='
          }).join('&') !== '' ? '?' + l.search.slice(1).split('&').filter(function (s) {
            return s.slice(0, 2) !== 'p='
          }).join('&').replace(/&/g, '~and~') : '') + l.hash
        );
      }
    }
  }(window.location))
</script>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
